<!-- 1. A HEAD-be (a Chart.js után) -->
<script src="//unpkg.com/globe.gl"></script>

<!-- 2. A BODY-ba (pl. a stats-card és a grafikon közé) -->
<div class="container" style="margin-top: 20px;">
    <h2 style="text-align: center; color: var(--alapkek); font-weight: 600;">Virtuális Expedíció</h2>
    <div id="globeViz" style="height: 500px; width: 100%; border-radius: 15px; overflow: hidden; background: #000;"></div>
    <p style="text-align: center; font-size: 0.9rem; color: #666; margin-top: 10px;">
        Húzd az egeret a forgatáshoz, görgess a zoomoláshoz!
    </p>
</div>

<!-- 3. A SCRIPT végére (az updateDashboard függvény után) -->
<script>
    const travelRoute = [
        { name: 'Szeged', lat: 46.253, lng: 20.141 },
        { name: 'London', lat: 51.507, lng: -0.127 },
        { name: 'Subotica', lat: 46.100, lng: 19.665 },
        { name: 'Vienna', lat: 48.208, lng: 16.373 },
        { name: 'Athens', lat: 37.983, lng: 23.727 },
        { name: 'Glasgow', lat: 55.864, lng: -4.251 },
        { name: 'Amman', lat: 31.945, lng: 35.928 },
        { name: 'Amsterdam', lat: 52.367, lng: 4.904 },
        { name: 'Berlin', lat: 52.520, lng: 13.405 },
        { name: 'Brussels', lat: 50.850, lng: 4.351 },
        { name: 'Copenhagen', lat: 55.676, lng: 12.568 },
        { name: 'Galway', lat: 53.270, lng: -9.056 },
        { name: 'Istanbul', lat: 41.008, lng: 28.978 },
        { name: 'Kanjiža', lat: 46.062, lng: 20.048 },
        { name: 'Madrid', lat: 40.416, lng: -3.703 },
        { name: 'Ystad', lat: 55.429, lng: 13.820 },
        { name: 'Columbia, SC', lat: 34.000, lng: -81.034 },
        { name: 'Pune', lat: 18.520, lng: 73.856 },
        { name: 'Vientiane', lat: 17.975, lng: 102.633 },
        { name: 'Kigali', lat: -1.944, lng: 30.061 },
        { name: 'Szeged', lat: 46.253, lng: 20.141 }
    ];

    // Ívek generálása a városok között
    const arcsData = [];
    for (let i = 0; i < travelRoute.length - 1; i++) {
        arcsData.push({
            startLat: travelRoute[i].lat,
            startLng: travelRoute[i].lng,
            endLat: travelRoute[i+1].lat,
            endLng: travelRoute[i+1].lng,
            color: ['#ffeb00', '#0088cc'] // Sárgából kékbe hajló ívek
        });
    }

    const globe = Globe()
      (document.getElementById('globeViz'))
      .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg') // Szép kék textúra
      .backgroundColor('#ffffff') // Fehér háttér, hogy illeszkedjen az oldalhoz
      .arcData(arcsData)
      .arcColor('color')
      .arcDashLength(0.4)
      .arcDashGap(4)
      .arcDashAnimateTime(1500)
      .arcStroke(0.5)
      .labelsData(travelRoute)
      .labelLat(d => d.lat)
      .labelLng(d => d.lng)
      .labelText(d => d.name)
      .labelSize(1)
      .labelDotRadius(0.5)
      .labelColor(() => '#000080');

    // Automatikus forgatás
    globe.controls().autoRotate = true;
    globe.controls().autoRotateSpeed = 0.5;
</script>
